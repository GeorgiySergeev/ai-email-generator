<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="./support.js"></script>
  </head>
  <body>
    <x-dc>
      <helmet>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link
          rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin="anonymous"
        />
        <link
          rel="stylesheet"
          href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&amp;family=JetBrains+Mono:wght@300;400;500;700&amp;family=Share+Tech+Mono&amp;display=swap"
        />
        <style>
          *,
          *::before,
          *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
          }
          body {
            background: #0a0a0f;
            color: #e0e0e0;
            min-height: 100vh;
          }
          input {
            font-family: "JetBrains Mono", monospace;
            background: #12121a;
            color: #00ff88;
            border: 1px solid #2a2a3a;
            outline: none;
          }
          input:focus {
            border-color: #00ff88;
            box-shadow: 0 0 6px rgba(0, 255, 136, 0.22);
          }
          input::placeholder {
            color: #3a3a4a;
          }
          @keyframes blink {
            50% {
              opacity: 0;
            }
          }
          @keyframes pulse-glow {
            0%,
            100% {
              box-shadow:
                0 0 5px #00ff88,
                0 0 10px rgba(0, 255, 136, 0.35);
            }
            50% {
              box-shadow:
                0 0 14px #00ff88,
                0 0 28px rgba(0, 255, 136, 0.55);
            }
          }
          @keyframes fade-up {
            from {
              opacity: 0;
              transform: translateY(18px);
            }
            to {
              opacity: 1;
              transform: translateY(0);
            }
          }
          @keyframes scan-line {
            0% {
              top: -2px;
            }
            100% {
              top: 100vh;
            }
          }
          @keyframes rgb-shift {
            0%,
            100% {
              text-shadow:
                -1px 0 #ff00ff,
                1px 0 #00d4ff;
            }
            50% {
              text-shadow:
                1px 0 #ff00ff,
                -1px 0 #00d4ff;
            }
          }
        </style>
      </helmet>

      <!-- Scanlines -->
      <div
        style="
          position: fixed;
          inset: 0;
          pointer-events: none;
          z-index: 9990;
          background: repeating-linear-gradient(
            0deg,
            transparent,
            transparent 2px,
            rgba(0, 0, 0, 0.06) 2px,
            rgba(0, 0, 0, 0.06) 4px
          );
        "
      ></div>

      <!-- Circuit bg -->
      <div
        style="
          position: fixed;
          inset: 0;
          background-image:
            linear-gradient(rgba(0, 255, 136, 0.018) 1px, transparent 1px),
            linear-gradient(
              90deg,
              rgba(0, 255, 136, 0.018) 1px,
              transparent 1px
            );
          background-size: 50px 50px;
          pointer-events: none;
          z-index: 0;
        "
      ></div>
      <!-- Radial glow -->
      <div
        style="
          position: fixed;
          top: 50%;
          left: 50%;
          transform: translate(-50%, -50%);
          width: 600px;
          height: 600px;
          background: radial-gradient(
            ellipse,
            rgba(0, 255, 136, 0.04) 0%,
            transparent 70%
          );
          pointer-events: none;
          z-index: 0;
        "
      ></div>

      <!-- Layout -->
      <div
        style="
          min-height: 100vh;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          padding: 40px 16px;
          position: relative;
          z-index: 1;
        "
      >
        <!-- Logo -->
        <a
          href="Landing.dc.html"
          style="
            font-family: &quot;Orbitron&quot;, monospace;
            font-weight: 900;
            font-size: 1.1rem;
            color: #00ff88;
            text-decoration: none;
            letter-spacing: 0.14em;
            animation: rgb-shift 3.5s ease-in-out infinite;
            margin-bottom: 40px;
          "
          >NEUR·O·MAIL</a
        >

        <!-- Card -->
        <div
          style="
            width: 100%;
            max-width: 420px;
            animation: fade-up 0.45s ease both;
          "
        >
          <!-- Corner accents -->
          <div style="position: relative">
            <div
              style="
                position: absolute;
                top: -6px;
                left: -6px;
                width: 16px;
                height: 16px;
                border-top: 2px solid #00ff88;
                border-left: 2px solid #00ff88;
                z-index: 1;
              "
            ></div>
            <div
              style="
                position: absolute;
                top: -6px;
                right: -6px;
                width: 16px;
                height: 16px;
                border-top: 2px solid #00ff88;
                border-right: 2px solid #00ff88;
                z-index: 1;
              "
            ></div>
            <div
              style="
                position: absolute;
                bottom: -6px;
                left: -6px;
                width: 16px;
                height: 16px;
                border-bottom: 2px solid #00ff88;
                border-left: 2px solid #00ff88;
                z-index: 1;
              "
            ></div>
            <div
              style="
                position: absolute;
                bottom: -6px;
                right: -6px;
                width: 16px;
                height: 16px;
                border-bottom: 2px solid #00ff88;
                border-right: 2px solid #00ff88;
                z-index: 1;
              "
            ></div>

            <div
              style="
                background: #12121a;
                border: 1px solid #2a2a3a;
                clip-path: polygon(
                  0 14px,
                  14px 0,
                  calc(100% - 14px) 0,
                  100% 14px,
                  100% calc(100% - 14px),
                  calc(100% - 14px) 100%,
                  14px 100%,
                  0 calc(100% - 14px)
                );
                padding: 36px 32px;
              "
            >
              <!-- Terminal bar -->
              <div
                style="
                  display: flex;
                  align-items: center;
                  gap: 6px;
                  margin-bottom: 28px;
                "
              >
                <span
                  style="
                    width: 8px;
                    height: 8px;
                    border-radius: 50%;
                    background: #ff3366;
                    display: block;
                  "
                ></span>
                <span
                  style="
                    width: 8px;
                    height: 8px;
                    border-radius: 50%;
                    background: #ffcc00;
                    display: block;
                  "
                ></span>
                <span
                  style="
                    width: 8px;
                    height: 8px;
                    border-radius: 50%;
                    background: #00ff88;
                    display: block;
                    box-shadow: 0 0 4px #00ff88;
                  "
                ></span>
                <span
                  style="
                    margin-left: 8px;
                    font-family: &quot;Share Tech Mono&quot;, monospace;
                    font-size: 0.58rem;
                    color: #3a3a4a;
                    letter-spacing: 0.08em;
                  "
                  >neuromail://auth/session</span
                >
                <span
                  style="
                    margin-left: auto;
                    font-family: &quot;JetBrains Mono&quot;, monospace;
                    font-size: 0.65rem;
                    color: #3a3a4a;
                    animation: blink 1.1s step-end infinite;
                  "
                  >█</span
                >
              </div>

              <!-- Tab switcher -->
              <div
                style="
                  display: flex;
                  margin-bottom: 28px;
                  border-bottom: 1px solid #2a2a3a;
                "
              >
                <button onClick="{{ setLogin }}" style="{{ tabLoginStyle }}">
                  // LOGIN
                </button>
                <button
                  onClick="{{ setRegister }}"
                  style="{{ tabRegisterStyle }}"
                >
                  // REGISTER
                </button>
              </div>

              <!-- Heading -->
              <div
                style="
                  font-family: &quot;Share Tech Mono&quot;, monospace;
                  font-size: 0.58rem;
                  color: #00ff88;
                  letter-spacing: 0.22em;
                  text-transform: uppercase;
                  margin-bottom: 8px;
                "
              >
                {{ formEyebrow }}
              </div>
              <h1
                style="
                  font-family: &quot;Orbitron&quot;, monospace;
                  font-size: 1.3rem;
                  font-weight: 900;
                  text-transform: uppercase;
                  letter-spacing: 0.06em;
                  color: #e0e0e0;
                  margin-bottom: 24px;
                "
              >
                {{ formTitle }}
              </h1>

              <!-- Error -->
              <sc-if value="{{ hasError }}" hint-placeholder-val="{{ false }}">
                <div
                  style="
                    background: rgba(255, 51, 102, 0.08);
                    border: 1px solid rgba(255, 51, 102, 0.35);
                    padding: 10px 14px;
                    font-family: &quot;JetBrains Mono&quot;, monospace;
                    font-size: 0.72rem;
                    color: #ff3366;
                    margin-bottom: 18px;
                    clip-path: polygon(
                      0 4px,
                      4px 0,
                      calc(100% - 4px) 0,
                      100% 4px,
                      100% calc(100% - 4px),
                      calc(100% - 4px) 100%,
                      4px 100%,
                      0 calc(100% - 4px)
                    );
                  "
                >
                  ERR: {{ errorMsg }}
                </div>
              </sc-if>

              <!-- Fields -->
              <div
                style="
                  display: flex;
                  flex-direction: column;
                  gap: 16px;
                  margin-bottom: 20px;
                "
              >
                <!-- Email -->
                <div>
                  <div
                    style="
                      font-family: &quot;Share Tech Mono&quot;, monospace;
                      font-size: 0.58rem;
                      color: #6b7280;
                      letter-spacing: 0.14em;
                      text-transform: uppercase;
                      margin-bottom: 7px;
                    "
                  >
                    EMAIL_ADDRESS
                  </div>
                  <div style="position: relative">
                    <span
                      style="
                        position: absolute;
                        left: 12px;
                        top: 50%;
                        transform: translateY(-50%);
                        color: #00ff88;
                        font-family: &quot;JetBrains Mono&quot;, monospace;
                        font-size: 0.82rem;
                        pointer-events: none;
                      "
                      >></span
                    >
                    <input
                      type="email"
                      value="{{ email }}"
                      onChange="{{ handleEmail }}"
                      placeholder="user@domain.com"
                      style="
                        width: 100%;
                        padding: 11px 11px 11px 30px;
                        font-size: 0.78rem;
                        clip-path: polygon(
                          0 5px,
                          5px 0,
                          calc(100% - 5px) 0,
                          100% 5px,
                          100% calc(100% - 5px),
                          calc(100% - 5px) 100%,
                          5px 100%,
                          0 calc(100% - 5px)
                        );
                      "
                    />
                  </div>
                </div>
                <!-- Password -->
                <div>
                  <div
                    style="
                      font-family: &quot;Share Tech Mono&quot;, monospace;
                      font-size: 0.58rem;
                      color: #6b7280;
                      letter-spacing: 0.14em;
                      text-transform: uppercase;
                      margin-bottom: 7px;
                    "
                  >
                    PASSWORD
                  </div>
                  <div style="position: relative">
                    <span
                      style="
                        position: absolute;
                        left: 12px;
                        top: 50%;
                        transform: translateY(-50%);
                        color: #00ff88;
                        font-family: &quot;JetBrains Mono&quot;, monospace;
                        font-size: 0.82rem;
                        pointer-events: none;
                      "
                      >></span
                    >
                    <input
                      type="password"
                      value="{{ password }}"
                      onChange="{{ handlePassword }}"
                      placeholder="min. 8 characters"
                      style="
                        width: 100%;
                        padding: 11px 11px 11px 30px;
                        font-size: 0.78rem;
                        clip-path: polygon(
                          0 5px,
                          5px 0,
                          calc(100% - 5px) 0,
                          100% 5px,
                          100% calc(100% - 5px),
                          calc(100% - 5px) 100%,
                          5px 100%,
                          0 calc(100% - 5px)
                        );
                      "
                    />
                  </div>
                </div>
                <!-- Confirm (register only) -->
                <sc-if
                  value="{{ isRegister }}"
                  hint-placeholder-val="{{ false }}"
                >
                  <div>
                    <div
                      style="
                        font-family: &quot;Share Tech Mono&quot;, monospace;
                        font-size: 0.58rem;
                        color: #6b7280;
                        letter-spacing: 0.14em;
                        text-transform: uppercase;
                        margin-bottom: 7px;
                      "
                    >
                      CONFIRM_PASSWORD
                    </div>
                    <div style="position: relative">
                      <span
                        style="
                          position: absolute;
                          left: 12px;
                          top: 50%;
                          transform: translateY(-50%);
                          color: #00ff88;
                          font-family: &quot;JetBrains Mono&quot;, monospace;
                          font-size: 0.82rem;
                          pointer-events: none;
                        "
                        >></span
                      >
                      <input
                        type="password"
                        value="{{ confirm }}"
                        onChange="{{ handleConfirm }}"
                        placeholder="repeat password"
                        style="
                          width: 100%;
                          padding: 11px 11px 11px 30px;
                          font-size: 0.78rem;
                          clip-path: polygon(
                            0 5px,
                            5px 0,
                            calc(100% - 5px) 0,
                            100% 5px,
                            100% calc(100% - 5px),
                            calc(100% - 5px) 100%,
                            5px 100%,
                            0 calc(100% - 5px)
                          );
                        "
                      />
                    </div>
                  </div>
                </sc-if>
              </div>

              <!-- Submit -->
              <button onClick="{{ handleSubmit }}" style="{{ submitBtnStyle }}">
                {{ submitLabel }}
              </button>

              <!-- Footer link -->
              <div
                style="
                  margin-top: 20px;
                  text-align: center;
                  font-family: &quot;JetBrains Mono&quot;, monospace;
                  font-size: 0.7rem;
                  color: #3a3a4a;
                "
              >
                {{ switchText }}
                <a
                  href="#"
                  onClick="{{ switchTab }}"
                  style="
                    color: #00ff88;
                    text-decoration: none;
                    transition: opacity 120ms;
                  "
                  style-hover="opacity:0.7"
                  >{{ switchLink }}</a
                >
              </div>
            </div>
          </div>
        </div>

        <!-- Back -->
        <a
          href="Landing.dc.html"
          style="
            margin-top: 28px;
            font-family: &quot;JetBrains Mono&quot;, monospace;
            font-size: 0.68rem;
            color: #3a3a4a;
            text-decoration: none;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            transition: color 120ms;
          "
          style-hover="color:#6b7280"
          >← back to home</a
        >
      </div>
    </x-dc>
    <script type="text/x-dc" data-dc-script>
      class Component extends DCLogic {
        state = {
          tab: 'login',
          email: '',
          password: '',
          confirm: '',
          error: '',
          loading: false,
        };

        tabStyle(active) {
          return {
            flex: 1,
            padding: '10px 12px',
            background: 'transparent',
            border: 'none',
            borderBottom: active ? '2px solid #00ff88' : '2px solid transparent',
            color: active ? '#00ff88' : '#6b7280',
            fontFamily: '"JetBrains Mono",monospace',
            fontSize: '0.68rem',
            textTransform: 'uppercase',
            letterSpacing: '0.12em',
            cursor: 'pointer',
            transition: 'all 150ms',
            marginBottom: '-1px',
          };
        }

        renderVals() {
          const s = this.state;
          const isLogin = s.tab === 'login';
          const isRegister = s.tab === 'register';
          const canSubmit = s.email.trim() && s.password && !s.loading;

          return {
            isRegister,
            hasError: !!s.error,
            errorMsg: s.error,
            email: s.email,
            password: s.password,
            confirm: s.confirm,
            formEyebrow: isLogin ? '// ACCESS TERMINAL' : '// CREATE ACCOUNT',
            formTitle: isLogin ? 'SIGN IN' : 'REGISTER',
            submitLabel: s.loading ? '// AUTHENTICATING...' : (isLogin ? '// SIGN IN' : '// CREATE ACCOUNT'),
            switchText: isLogin ? "Don't have an account?" : 'Already registered?',
            switchLink: isLogin ? 'Register here' : 'Sign in',
            tabLoginStyle: this.tabStyle(isLogin),
            tabRegisterStyle: this.tabStyle(isRegister),
            submitBtnStyle: {
              width: '100%',
              fontFamily: '"JetBrains Mono",monospace',
              fontSize: '0.76rem',
              fontWeight: 700,
              textTransform: 'uppercase',
              letterSpacing: '0.2em',
              padding: '13px',
              background: '#00ff88',
              color: '#0a0a0f',
              border: 'none',
              cursor: canSubmit ? 'pointer' : 'not-allowed',
              opacity: canSubmit ? 1 : 0.38,
              clipPath: 'polygon(0 6px,6px 0,calc(100% - 6px) 0,100% 6px,100% calc(100% - 6px),calc(100% - 6px) 100%,6px 100%,0 calc(100% - 6px))',
              transition: 'all 150ms',
              boxShadow: canSubmit ? '0 0 12px rgba(0,255,136,0.28)' : 'none',
              animation: canSubmit ? 'pulse-glow 3s ease-in-out infinite' : 'none',
            },
            setLogin: (e) => { e.preventDefault(); this.setState({ tab:'login', error:'' }); },
            setRegister: (e) => { e.preventDefault(); this.setState({ tab:'register', error:'' }); },
            switchTab: (e) => { e.preventDefault(); this.setState(st => ({ tab: st.tab==='login'?'register':'login', error:'' })); },
            handleEmail: (e) => this.setState({ email: e.target.value, error: '' }),
            handlePassword: (e) => this.setState({ password: e.target.value, error: '' }),
            handleConfirm: (e) => this.setState({ confirm: e.target.value, error: '' }),
            handleSubmit: () => {
              const { tab, email, password, confirm } = this.state;
              if (!email || !email.includes('@')) { this.setState({ error: 'Enter a valid email address.' }); return; }
              if (password.length < 8) { this.setState({ error: 'Password must be at least 8 characters.' }); return; }
              if (tab === 'register' && password !== confirm) { this.setState({ error: 'Passwords do not match.' }); return; }
              this.setState({ loading: true, error: '' });
              setTimeout(() => { window.location.href = 'Dashboard.dc.html'; }, 1000);
            },
          };
        }
      }
    </script>
  </body>
</html>
